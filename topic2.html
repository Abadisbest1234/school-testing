<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
        }

        canvas {
            border: 2px solid #00f;
            background-color: #000;
            display: block;
            margin-bottom: 20px;
        }

        .info {
            text-align: center;
            font-size: 14px;
            max-width: 600px;
        }

        .score {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ffff00;
        }

        .controls {
            font-size: 14px;
            margin-top: 10px;
            color: #0ff;
        }
    </style>
</head>
<body>
    <h1>🎮 Pac-Man Game</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">
        <p>Use Arrow Keys to move Pac-Man. Collect all the dots to win!</p>
        <div class="controls">
            <p>↑ ↓ ← → to move</p>
            <p>Press R to restart</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const tileSize = 20;
        const cols = canvas.width / tileSize;
        const rows = canvas.height / tileSize;

        // Pac-Man
        let pacman = {
            x: Math.floor(cols / 2),
            y: Math.floor(rows / 2),
            dx: 0,
            dy: 0,
            nextDx: 0,
            nextDy: 0,
            mouthOpen: true,
            mouthTimer: 0
        };

        // Game state
        let dots = [];
        let score = 0;
        let gameWon = false;

        // Initialize dots
        function initDots() {
            dots = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (!(x === pacman.x && y === pacman.y)) {
                        dots.push({ x, y });
                    }
                }
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'arrowup':
                    pacman.nextDx = 0;
                    pacman.nextDy = -1;
                    e.preventDefault();
                    break;
                case 'arrowdown':
                    pacman.nextDx = 0;
                    pacman.nextDy = 1;
                    e.preventDefault();
                    break;
                case 'arrowleft':
                    pacman.nextDx = -1;
                    pacman.nextDy = 0;
                    e.preventDefault();
                    break;
                case 'arrowright':
                    pacman.nextDx = 1;
                    pacman.nextDy = 0;
                    e.preventDefault();
                    break;
                case 'r':
                    resetGame();
                    break;
            }
        });

        // Reset game
        function resetGame() {
            pacman = {
                x: Math.floor(cols / 2),
                y: Math.floor(rows / 2),
                dx: 0,
                dy: 0,
                nextDx: 0,
                nextDy: 0,
                mouthOpen: true,
                mouthTimer: 0
            };
            score = 0;
            gameWon = false;
            initDots();
            document.getElementById('score').textContent = '0';
        }

        // Update game state
        function update() {
            if (gameWon) return;

            // Try to move in the direction player wants
            if (canMove(pacman.x + pacman.nextDx, pacman.y + pacman.nextDy)) {
                pacman.dx = pacman.nextDx;
                pacman.dy = pacman.nextDy;
            }

            // Move Pac-Man
            const newX = pacman.x + pacman.dx;
            const newY = pacman.y + pacman.dy;

            if (canMove(newX, newY)) {
                pacman.x = newX;
                pacman.y = newY;
            }

            // Wrap around edges
            if (pacman.x < 0) pacman.x = cols - 1;
            if (pacman.x >= cols) pacman.x = 0;
            if (pacman.y < 0) pacman.y = rows - 1;
            if (pacman.y >= rows) pacman.y = 0;

            // Check for dots
            dots = dots.filter(dot => {
                if (dot.x === pacman.x && dot.y === pacman.y) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    return false;
                }
                return true;
            });

            // Check win condition
            if (dots.length === 0) {
                gameWon = true;
                alert('You Won! Score: ' + score);
            }

            // Animate mouth
            pacman.mouthTimer++;
            if (pacman.mouthTimer > 10) {
                pacman.mouthOpen = !pacman.mouthOpen;
                pacman.mouthTimer = 0;
            }
        }

        // Check if can move to position
        function canMove(x, y) {
            return x >= 0 && x < cols && y >= 0 && y < rows;
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw dots
            ctx.fillStyle = '#ffb8d1';
            dots.forEach(dot => {
                ctx.fillRect(
                    dot.x * tileSize + tileSize / 2 - 2,
                    dot.y * tileSize + tileSize / 2 - 2,
                    4,
                    4
                );
            });

            // Draw Pac-Man
            drawPacman();
        }

        // Draw Pac-Man
        function drawPacman() {
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();

            const x = pacman.x * tileSize + tileSize / 2;
            const y = pacman.y * tileSize + tileSize / 2;
            const radius = tileSize / 2 - 2;

            // Calculate mouth angle
            const mouthAngle = pacman.mouthOpen ? 0.3 : 0.1;

            // Get direction for rotation
            let startAngle = 0;
            let endAngle = Math.PI * 2;

            if (pacman.dx === 1) startAngle = -mouthAngle;
            else if (pacman.dx === -1) startAngle = Math.PI + mouthAngle;
            else if (pacman.dy === 1) startAngle = Math.PI / 2 + mouthAngle;
            else if (pacman.dy === -1) startAngle = -Math.PI / 2 + mouthAngle;

            endAngle = startAngle + (Math.PI * 2 - mouthAngle * 2);

            ctx.arc(x, y, radius, startAngle, endAngle);
            ctx.lineTo(x, y);
            ctx.fill();

            // Draw eye
            ctx.fillStyle = '#000';
            const eyeOffsetX = pacman.dx !== 0 ? pacman.dx * 4 : 0;
            const eyeOffsetY = pacman.dy !== 0 ? pacman.dy * 4 : 0;
            ctx.fillRect(x + eyeOffsetX - 1, y + eyeOffsetY - 1, 2, 2);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        initDots();
        gameLoop();
    </script>
</body>
</html>
