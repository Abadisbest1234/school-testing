<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Me - Abdul Abad Qureshi</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
</head>

<body>

<header>
    <h1>Contact Me</h1>
    <p>give me a email directly from this site</p>
</header>

<div class="container">

<div class="card">
    <h2>Send Me an email</h2>
    <p>Fill out the form below and I'll get back to you as soon as possible.</p>
    
    <form id="contactForm" class="contact-form">
        <div class="form-group">
            <label for="name"><strong>Your Name:</strong></label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email"><strong>Your Email:</strong></label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label for="subject"><strong>Subject:</strong></label>
            <input type="text" id="subject" name="subject" placeholder="What is this about?" required>
        </div>

        <div class="form-group">
            <label for="message"><strong>Message:</strong></label>
            <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
        <p id="statusMessage" class="status-message"></p>
    </form>
</div>

</div>

<footer>
    <p>Made by: Abdul Abad Qureshi | Contact Page 2026</p>
</footer>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2b0000);
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(90deg, #ff0000, #990000);
}

header h1 {
    font-size: 40px;
}

header p {
    opacity: 0.8;
}

.container {
    width: 85%;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(255,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(255,0,0,0.5);
}

h2 {
    color: #ff4d4d;
    margin-bottom: 10px;
}

h3 {
    margin-top: 10px;
    color: #ff9999;
}

ul {
    margin-left: 20px;
}

ul li {
    margin-bottom: 8px;
    line-height: 1.6;
}

a {
    color: #ff4d4d;
    font-weight: bold;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

footer {
    text-align: center;
    padding: 20px;
    background: black;
    margin-top: 20px;
}

/* Contact Form Styles */
.contact-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-group label {
    color: #ff9999;
    font-size: 14px;
}

.form-group input,
.form-group textarea {
    padding: 12px;
    border: 1px solid rgba(255,0,0,0.5);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    transition: 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border: 1px solid #ff4d4d;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 10px rgba(255,77,77,0.3);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
    color: rgba(255,255,255,0.5);
}

.form-group textarea {
    resize: vertical;
    min-height: 150px;
}

.submit-btn {
    padding: 12px 24px;
    background: linear-gradient(90deg, #ff4d4d, #ff6666);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

.submit-btn:hover {
    background: linear-gradient(90deg, #ff6666, #ff7777);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,77,77,0.4);
}

.submit-btn:active {
    transform: translateY(0);
}

.submit-btn:disabled {
    background: rgba(255,77,77,0.5);
    cursor: not-allowed;
    transform: none;
}

.status-message {
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    display: none;
}

.status-message.success {
    display: block;
    background: rgba(76,175,80,0.2);
    color: #4caf50;
    border: 1px solid #4caf50;
}

.status-message.error {
    display: block;
    background: rgba(244,67,54,0.2);
    color: #f44336;
    border: 1px solid #f44336;
}

.status-message.loading {
    display: block;
    background: rgba(255,193,7,0.2);
    color: #ffc107;
    border: 1px solid #ffc107;
}
</style>

<script>
//key plafe 
const PUBLIC_KEY = "X-LAs1MBtAjkB4Gx8";

function initializeEmailJS() {
    emailjs.init(PUBLIC_KEY);
}

window.addEventListener('load', function() {
    initializeEmailJS();
});

document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const submitBtn = document.querySelector('.submit-btn');
    const statusMessage = document.getElementById('statusMessage');
    
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    statusMessage.textContent = 'Sending your message...';
    statusMessage.className = 'status-message loading';
    
    try {
        const formData = {
            to_email: 'abadisbest1234@gmail.com', 
            name: document.getElementById('name').value,
            from_email: document.getElementById('email').value,
            subject: document.getElementById('subject').value,
            message: document.getElementById('message').value,
            reply_to: document.getElementById(from_email).value
        };
        
    
        const response = await emailjs.send(
            'Abad_project003',   
            'template_7dfsfz1',    
            formData
        );
        
        if (response.status === 200) {
            // Success!
            statusMessage.textContent = ' Message sent successfully! I\'ll get back to you soon.';
            statusMessage.className = 'status-message success';
            document.getElementById('contactForm').reset();
            
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }, 3000);
        }
    } catch (error) {
        console.error('Email sending failed:', error);
        statusMessage.textContent = ' Failed to send message. Please try again or contact me directly.';
        statusMessage.className = 'status-message error';
        
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
    }
});
</script>

</body>
</html>
